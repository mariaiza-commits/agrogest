<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroGestão - Offline</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; border-radius: 16px; padding: 32px 24px; text-align: center; max-width: 320px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #2d6a2d; margin: 0 0 8px; }
    p { font-size: 14px; color: #666; line-height: 1.5; margin: 0 0 20px; }
    button { background: #2d6a2d; color: white; border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌾</div>
    <h1>Sem conexão</h1>
    <p>Você está offline. Os dados que você lançar serão salvos e enviados automaticamente quando a internet voltar.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
